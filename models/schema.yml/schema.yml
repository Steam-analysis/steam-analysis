version: 2

models:
  - name: stg_players
    description: Cleaned player dimension table with standardized player id, country, and account creation timestamp.
    columns:
      - name: player_id
        description: Unique player identifier converted to string.
        tests:
          - not_null
          - unique
      - name: country
        description: Cleaned country value in lowercase format.
      - name: created_at
        description: Player account creation timestamp.

  - name: stg_history
    description: Cleaned achievement history table showing which player acquired which achievement and when.
    columns:
      - name: player_id
        description: Player identifier.
        tests:
          - not_null
      - name: achievement_id
        description: Achievement identifier.
        tests:
          - not_null
      - name: acquired_at
        description: Timestamp when the achievement was acquired.
        tests:
          - not_null

  - name: int_player_achievement_activity
    description: Intermediate player-level aggregation of achievement behavior.
    columns:
      - name: player_id
        description: Player identifier.
        tests:
          - not_null
          - unique
      - name: total_achievements_unlocked
        description: Total number of achievements unlocked by the player.
      - name: first_achievement_at
        description: First achievement acquisition timestamp.
      - name: last_achievement_at
        description: Most recent achievement acquisition timestamp.
      - name: days_since_last_achievement
        description: Number of days since the player last acquired an achievement.

  - name: mart_player_engagement
    description: Business-ready player engagement mart used for churn analysis.
    columns:
      - name: player_id
        description: Unique player identifier.
        tests:
          - not_null
          - unique
      - name: country
        description: Player country.
      - name: created_at
        description: Player account creation timestamp.
      - name: total_achievements_unlocked
        description: Total achievements unlocked by player.
      - name: days_since_last_achievement
        description: Inactivity metric based on last achievement date.
      - name: engagement_status
        description: Player engagement segment such as Active, Inactive, or Churn Risk.